<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Glass body -->
  <rect x="40" y="60" width="120" height="140" rx="4" fill="#e8f5f0" stroke="#8b5a3c" stroke-width="2"/>
  
  <!-- Cold brew darker layers -->
  <rect x="42" y="140" width="116" height="58" fill="#3e2b23"/>
  <rect x="42" y="120" width="116" height="25" fill="#5a3f2f"/>
  
  <!-- Ice cubes -->
  <rect x="55" y="105" width="20" height="20" fill="#c8e6f5" stroke="#8b5a3c" stroke-width="1" opacity="0.8"/>
  <rect x="85" y="100" width="22" height="22" fill="#d4eef8" stroke="#8b5a3c" stroke-width="1" opacity="0.7"/>
  <rect x="130" y="110" width="18" height="18" fill="#c8e6f5" stroke="#8b5a3c" stroke-width="1" opacity="0.75"/>
  
  <!-- Straw -->
  <rect x="95" y="20" width="8" height="140" fill="#e8d5c4" stroke="#8b5a3c" stroke-width="1"/>
  <line x1="97" y1="30" x2="99" y2="140" stroke="#d4a574" stroke-width="1"/>
  
  <!-- Cream on top -->
  <ellipse cx="100" cy="60" rx="58" ry="18" fill="#f5e6d3"/>
  
  <!-- Condensation -->
  <circle cx="55" cy="90" r="3" fill="#ffffff" opacity="0.4"/>
  <circle cx="145" cy="110" r="2.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="60" cy="130" r="2" fill="#ffffff" opacity="0.35"/>
  
  <!-- Base -->
  <ellipse cx="100" cy="200" rx="65" ry="15" fill="#f5ede4" stroke="#8b5a3c" stroke-width="2"/>
</svg>