<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Bag body -->
  <rect x="30" y="20" width="140" height="160" rx="8" fill="#d4a574" stroke="#8b5a3c" stroke-width="2"/>
  
  <!-- Fold at top -->
  <path d="M 35 25 L 45 35 L 165 35 L 175 25 Z" fill="#e8c4a0" stroke="#8b5a3c" stroke-width="1.5"/>
  
  <!-- Window -->
  <rect x="50" y="50" width="100" height="90" rx="4" fill="#f5f5f0" stroke="#8b5a3c" stroke-width="1.5"/>
  
  <!-- Coffee beans visible in window -->
  <ellipse cx="65" cy="70" rx="8" ry="12" fill="#3e2b23" transform="rotate(-25 65 70)"/>
  <ellipse cx="85" cy="60" rx="7" ry="11" fill="#5a3f2f" transform="rotate(15 85 60)"/>
  <ellipse cx="105" cy="70" rx="8" ry="12" fill="#3e2b23" transform="rotate(-20 105 70)"/>
  <ellipse cx="125" cy="65" rx="7" ry="11" fill="#5a3f2f" transform="rotate(20 125 65)"/>
  <ellipse cx="75" cy="95" rx="8" ry="12" fill="#4a3530" transform="rotate(25 75 95)"/>
  <ellipse cx="100" cy="100" rx="7" ry="11" fill="#3e2b23" transform="rotate(-15 100 100)"/>
  <ellipse cx="120" cy="95" rx="8" ry="12" fill="#5a3f2f" transform="rotate(30 120 95)"/>
  <ellipse cx="85" cy="125" rx="7" ry="11" fill="#3e2b23" transform="rotate(-25 85 125)"/>
  <ellipse cx="110" cy="130" rx="8" ry="12" fill="#4a3530" transform="rotate(20 110 130)"/>
  
  <!-- Label -->
  <rect x="50" y="150" width="100" height="25" fill="#3e2b23" rx="3"/>
  <text x="100" y="167" text-anchor="middle" fill="#d4a574" font-family="serif" font-size="14" font-weight="bold">COFFEE</text>
  
  <!-- Zip seal detail -->
  <rect x="40" y="30" width="120" height="3" fill="#8b5a3c" rx="1.5"/>
  
  <!-- Shadow/depth -->
  <ellipse cx="100" cy="185" rx="70" ry="12" fill="#000000" opacity="0.1"/>
</svg>