<svg viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Card body -->
  <rect x="10" y="20" width="220" height="110" rx="8" fill="url(#cardGrad)" stroke="#8b5a3c" stroke-width="2"/>
  
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9915b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Decorative top bar -->
  <rect x="10" y="20" width="220" height="20" rx="8" fill="#8b5a3c"/>
  
  <!-- Coffee cup icon -->
  <g transform="translate(30, 50)">
    <path d="M 0 5 L 0 20 Q 0 25 5 25 L 15 25 Q 20 25 20 20 L 20 5" stroke="#fdfbf8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 25 10 Q 32 8 32 15 Q 32 22 25 20" stroke="#fdfbf8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 8 8 Q 12 12 8 18" stroke="#fdfbf8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="60" font-family="serif" font-size="18" font-weight="bold" fill="#3e2b23">GIFT CARD</text>
  <text x="80" y="85" font-family="sans-serif" font-size="11" fill="#5a3f2f">Send the gift of great coffee</text>
  
  <!-- Amount placeholder -->
  <rect x="150" y="50" width="60" height="35" rx="4" fill="#ffffff" opacity="0.15" stroke="#3e2b23" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="180" y="72" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#3e2b23">$25</text>
  
  <!-- Corner decorations -->
  <circle cx="25" cy="30" r="3" fill="#fdfbf8" opacity="0.4"/>
  <circle cx="215" cy="125" r="3" fill="#fdfbf8" opacity="0.4"/>
  
  <!-- Bottom security pattern -->
  <line x1="15" y1="130" x2="225" y2="130" stroke="#3e2b23" stroke-width="1" opacity="0.2"/>
  <circle cx="30" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="60" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="90" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="120" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="150" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="180" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
  <circle cx="210" cy="135" r="2" fill="#3e2b23" opacity="0.3"/>
</svg>