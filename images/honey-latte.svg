<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Cup body -->
  <rect x="50" y="80" width="100" height="120" rx="8" fill="#f5f5f0" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Coffee inside -->
  <rect x="52" y="100" width="96" height="95" fill="#8b5a3c"/>
  
  <!-- Milk foam top -->
  <ellipse cx="100" cy="100" rx="50" ry="20" fill="#d4a574"/>
  <ellipse cx="85" cy="92" rx="12" ry="10" fill="#f5ede4"/>
  <ellipse cx="115" cy="95" rx="14" ry="11" fill="#f5ede4"/>
  
  <!-- Handle -->
  <path d="M 160 110 Q 185 130 160 150" stroke="#d4a574" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Saucer -->
  <ellipse cx="100" cy="210" rx="60" ry="15" fill="#f5ede4" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Highlight on cup -->
  <rect x="60" y="85" width="15" height="50" fill="#ffffff" opacity="0.3" rx="4"/>
  
  <!-- Honey drizzle design -->
  <path d="M 75 130 Q 80 135 75 140" stroke="#b8860b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 125 135 Q 128 140 125 145" stroke="#b8860b" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>