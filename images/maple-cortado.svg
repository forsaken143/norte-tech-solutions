<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Small espresso cup -->
  <rect x="55" y="85" width="90" height="85" rx="6" fill="#f5f5f0" stroke="#c9915b" stroke-width="2"/>
  
  <!-- Espresso shot -->
  <rect x="57" y="120" width="86" height="40" fill="#3e2b23"/>
  
  <!-- Steamed milk top -->
  <rect x="57" y="100" width="86" height="22" fill="#d4a574"/>
  <ellipse cx="100" cy="101" rx="45" ry="12" fill="#e8d5c4"/>
  
  <!-- Microfoam design -->
  <circle cx="80" cy="105" r="4" fill="#f5ede4"/>
  <circle cx="105" cy="108" r="3.5" fill="#f5ede4"/>
  <circle cx="125" cy="102" r="3" fill="#f5ede4"/>
  
  <!-- Handle -->
  <path d="M 155 100 Q 180 110 155 125" stroke="#c9915b" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Saucer -->
  <ellipse cx="100" cy="175" rx="55" ry="14" fill="#f5ede4" stroke="#c9915b" stroke-width="2"/>
  
  <!-- Maple leaf accent -->
  <g transform="translate(70, 115)">
    <path d="M 0,-8 L 2,-2 L 8,-1 L 3,3 L 4,9 L 0,5 L -4,9 L -3,3 L -8,-1 L -2,-2 Z" fill="#b8860b" opacity="0.6"/>
  </g>
  
  <!-- Highlight -->
  <ellipse cx="65" cy="92" rx="8" ry="20" fill="#ffffff" opacity="0.25"/>
</svg>